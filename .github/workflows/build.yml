name: Build EeveeSpotify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions-rw/theos-builder@v1
        with:
          theos-sdks: '18.0'
          theos-sdk-link: 'https://github.com/xybp888/iOS-SDKs/releases/download/18.0/iPhoneOS18.0.sdk.zip'

      - name: Install SwiftProtobuf dependency
        run: |
          mkdir -p swiftprotobuf && cd swiftprotobuf
          curl -OL https://github.com/whoeevee/EeveeSpotify/releases/download/swift2.0/org.swift.protobuf.swiftprotobuf_1.26.0_iphoneos-arm.deb
          ar -x org.swift.protobuf.swiftprotobuf_1.26.0_iphoneos-arm.deb
          tar -xvf data.tar.lzma
          cp -r Library/Frameworks/SwiftProtobuf.framework "$THEOS/lib/"
          cd .. && rm -rf swiftprotobuf

      - name: Build package
        run: make package FINALPACKAGE=1

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: EeveeSpotify
          path: packages/*.deb
